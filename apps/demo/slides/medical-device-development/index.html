<body>

  <script>
    const theme={brand:"#b91c1c",A:"#0d8f8f",B:"#0f2a4a",C:"#a8321e",D:"#c8741a",E:"#7b2a6e"};
    const src={def:"IMDRF/GHTF SG1/N071:2012 Definitions for Medical Devices",regs:"FDA, EU MDR/IVDR, PMDA/MHLW, NMPA, TFDA official pathways",imdrf:"IMDRF guidance; WHO TRS 1045 Annex 3 Global Model Regulatory Framework",design:"Stanford d.school; UK Design Council; IDEO.org HCD Toolkit; AHEAD, JGIM 2021; Christensen JTBD",trans:"Stanford Biodesign; MIT Hacking Medicine; Cambridge EDC; Cooper/ASME Stage-Gate",standards:"FDA Design Controls; ISO 13485; ISO 14971; IEC 62304; IEC 62366-1; FDA TPLC / PCCP",samd:"IMDRF SaMD N12 (2014) and N81 (2025)",business:"Ries Lean Startup; Osterwalder Business Model Canvas; Christensen JTBD; FDA Q-Submission Program",adoption:"Greenhalgh NASSS, JMIR 2017; Rogers Diffusion; CFIR; RE-AIM; MRC Complex Interventions"};
    const img={mri:["assets/web/mri-philips-slide.jpg","WC/MRI-Philips"],mri3t:["assets/web/modern-3t-mri-slide.jpg","WC/Modern 3T MRI"],ct:["assets/web/ct-scanner-slide.jpg","WC/CT scanner"],ox:["assets/web/pulse-oximeter-slide.jpg","WC/Oximetro"],pump:["assets/web/baxter-infusion-pump-slide.jpg","WC/Baxter pump"],robot:["assets/web/surgery-robot-slide.jpg","WC/Da Vinci robot"],genexpert:["assets/web/genexpert-slide.jpg","WC/GeneXpert"],ultrasound:["assets/web/ultrasound-room-slide.jpg","WC/Ultrasound"],pacemaker:["assets/web/pacemaker-slide.jpg","WC/Pacemaker"],ward:["assets/ward-observation.png","Clinical observation"]};
    const ai={cover:"assets/ai/ai-cover-global-map.jpg",spill:"assets/ai/ai-tech-spillover.jpg",waves:"assets/ai/ai-seven-tech-waves.jpg",companies:"assets/ai/ai-company-archetypes.jpg",regulatory:"assets/ai/ai-regulatory-ecosystem.jpg",history:"assets/ai/ai-regulation-history.jpg",system:"assets/ai/ai-device-system-mismatch.jpg",families:"assets/ai/ai-five-family-map.jpg",translate:"assets/ai/ai-identify-invent-implement.jpg",vmodel:"assets/ai/ai-vmodel-traceability.jpg",safety:"assets/ai/ai-safety-evidence-story.jpg",nasss:"assets/ai/ai-nasss-heatmap-scene.jpg",graveyard:"assets/ai/ai-device-system-mismatch-graveyard.jpg",decision:"assets/ai/ai-decision-guide-flow.jpg",closing:"assets/ai/ai-closing-checklist-card.jpg"};
    const slides=[
      {layout:"cover",eye:"A 90-minute working session",accent:theme.A,title:"Medical Device<br>Development",kicker:"Appropriate innovation for real health systems",sub:"A good device for your setting is not always the most advanced device. It is the device that survives your health system.",speaker:["Prof. Che-Wei Lin, Ph.D.","Department of Biomedical Engineering, National Cheng Kung University","Medical Device Innovation Center | Wearable Technology and Mobile Healthcare Laboratory","Research: AI medical wearable devices, biomedical signal processing, VR-based assistive systems"],tags:["International Youth Visitors","LMIC / resource-constrained settings","Interactive"],source:"Course synthesis from the five-family framework map."},
      {layout:"agenda",eye:"Agenda - 90 minutes",title:"What we will do together",accent:theme.brand,items:[["1. Device or not?","00-16 min","Who is in the room, intended-use Q&A, and Interaction 1 live vote (6 min)."],["2. Design safely","16-60 min","Technology evolution, ecosystem, risk, regulation, and five framework families."],["3. Survival test","60-90 min","LMIC adoption, decision guide, Interaction 2 team worksheet (15 min), safety check, and checklist."]],callout:"Two protected active moments: Interaction 1 = 6 minutes; Interaction 2 = 15 minutes. Everything returns to five survival questions: Need, Translate, Regulate, Value, Adopt."},
      {layout:"audience",eye:"Who is in the room",title:"This room already contains a device-development team",accent:theme.A,groups:[["Frontline clinical roles","Nurses, paramedic, medical officer, radiographer, OT, psychologist, pharmacist, lab and blood-transfusion staff bring real patient and workflow problems."],["Health-system builders","Ministry of Health, HMIS, network security, CHAI, hospital operations know data flow, procurement, cybersecurity, and scale-up barriers."],["Engineering + BME roles","Students, researchers, mechanical/materials/BME faculty bring prototyping, measurement, usability, and technical translation skills."],["NCKU ecosystem","Biomedical engineering, MDIC, WTMH, and Taiwan clinical partners connect problem finding, device design, and implementation."]],callout:"Today we will use roles as examples, not countries: radiology, HMIS, EMS, maternity, OT, lab, pharmacy, engineering, and hospital management."},
      {layout:"definitionPhoto",eye:"First, a shared definition",title:"What is a medical device?",accent:theme.brand,definition:"A product becomes a medical device because of intended use: diagnosis, monitoring, prediction, prognosis, treatment, alleviation, support, replacement, modification, or IVD information. The same technology can be wellness, research, or regulated medical device depending on the claim.",examples:[["Q: Is a smartwatch a medical device?","A step counter is usually wellness. An ECG app claiming atrial-fibrillation detection can become a medical device."],["Q: Is a VR game a medical device?","A motivation game may be wellness. A VR rehabilitation system that guides stroke therapy or measures progress can be a device."],["Q: Is an Excel dashboard a medical device?","Hospital inventory is operations. Software that recommends triage, diagnosis, or treatment may become SaMD."]],photos:[img.ox,img.pacemaker,img.mri],source:src.def},
      {layout:"discussion",eye:"Interaction 1 - 6 minutes",title:"Live vote: device or not?",accent:theme.A,questions:[["Smartwatch ECG","Wellness tracker, maybe device, or medical device? What claim changes the answer?","Vote: Not a device / Maybe / Medical device"],["WhatsApp referral group","Communication tool or medical device? What if it scores urgency and recommends referral?","30-sec neighbor check: what claim changed?"],["HMIS sepsis alert","Operations dashboard or SaMD? Who acts on the recommendation, and what happens if it is wrong?","Ask: clinical decision + harm if wrong"]],worksheet:[["Smartwatch ECG","My vote: ___","Claim that changes answer: ___","Possible harm if wrong: ___"],["Referral group","My vote: ___","Claim that changes answer: ___","Possible harm if wrong: ___"],["HMIS alert","My vote: ___","Claim that changes answer: ___","Possible harm if wrong: ___"]],callout:"Vote first with your hand: Not a device / Maybe / Medical device. Then turn to one neighbor for 30 seconds and explain the claim that changed your mind. Write the claim and possible harm before changing your vote.",source:"Class interaction: intended-use live vote."},
      {layout:"constraintsDashboard",eye:"Appropriate innovation",title:"Design constraints are not weaknesses",accent:theme.D,cards:[["Power + connectivity","Design for outage: battery backup, solar charging, low-power mode, offline-first data, and delayed sync.",82],["Maintenance + spare parts","Use modular parts, local repair manuals, spare-part plans, and realistic service contracts.",76],["Procurement delay + total cost","Count consumables, calibration, tender cycles, warranty, repair, replacement, and who owns the budget.",70],["People + workflow","Use nurse-led or technician-led workflows; make escalation rules simple and visible.",64],["Environment + language","Plan for humidity, dust, shared devices, local language, literacy, and training turnover.",58]],callout:"Appropriate innovation is not lower ambition. It is higher respect for the system where the device must live.",photos:[img.ultrasound,img.genexpert,img.ox],source:"WHO GMRF; WHO medical-device donation guidance; LMIC implementation practice."},
      {layout:"techSpillover",eye:"Technology evolution",title:"Medical devices are industrial technologies translated into care",accent:theme.B,lead:"A useful way to read medical-device history: each industrial wave brought a new way to sense, repair, replace, image, control, or decide inside healthcare.",chain:[["Industrial capability","materials, machining, electronics, semiconductors, robotics, cloud, AI"],["Medical translation","sterile consumables, implants, monitors, imaging, surgical robots, SaMD"],["Company archetype","global MedTech groups that turn engineering capability into regulated clinical systems"]],callout:"For an international audience, the story is not one country's industry. It is how general-purpose technologies repeatedly crossed into medicine and created new device categories.",ai:ai.spill,source:"Teaching synthesis: industrial technology evolution and international MedTech company examples."},
      {layout:"techWaveGrid",eye:"Seven technology waves",title:"Seven technology waves created seven device categories",accent:theme.A,waves:[["Materials + polymers","Polymer science, nonwovens, biocompatible materials","Wound dressings, catheters, gloves, basic consumables","3M, BD, Baxter"],["Precision mechanics","Machining, surface treatment, mechanical design","Surgical tools, orthopedic implants, rehab and procedural tools","Stryker, Zimmer Biomet, Smith+Nephew"],["Electronics + instruments","Sensors, control, signal processing, displays","Patient monitoring, ultrasound, diagnostic instruments","GE HealthCare, Philips, Drager, Nihon Kohden"],["Medical imaging systems","High-end imaging, radiation, system integration","X-ray, CT, MRI, ultrasound, interventional imaging","Siemens Healthineers, GE HealthCare, Philips, Canon Medical"],["Miniaturization + semiconductors","Microelectronics, low-power sensing, packaging","Implants, wearables, neuromodulation, physiological monitoring","Medtronic, Abbott, Boston Scientific, Dexcom"],["Robotics + control","Robotics, navigation, intraoperative integration","Surgical robots, navigation surgery, intervention platforms","Intuitive Surgical, Stryker, J&J MedTech"],["ICT, cloud + AI","Cloud, AI/ML, multimodal data integration","SaMD, imaging AI, remote monitoring, digital cardiovascular analysis","HeartFlow, Philips, GE HealthCare, Medtronic"]],callout:"These are product categories. Later we will use five development lenses to judge whether they survive in real health systems.",ai:ai.waves,source:"International company examples selected for teaching; company portfolios evolve over time."},
      {layout:"companyArchetypes",eye:"International company examples",title:"Each wave put a different kind of company on stage",accent:theme.C,cases:[["Materials era","3M / BD / Baxter","Healthcare starts with reliable, sterile, repeatable materials: consumables, catheters, dressings, infusion and hospital basics."],["Instrumentation era","Siemens Healthineers / GE HealthCare / Philips","Electrical and industrial engineering become imaging, ultrasound, monitoring, diagnostics, and connected hospital equipment."],["Miniaturized device era","Medtronic / Abbott / Boston Scientific","Microelectronics, sensors, and materials make chronic disease devices, implants, neuromodulation, CGM, and minimally invasive intervention possible."],["Robotic procedure era","Intuitive Surgical","Robotics and precision control change surgery from a handheld tool problem into a platform, training, service, and workflow problem."],["Software-first era","HeartFlow","AI, cloud, and image analysis show that the core medical device can be an algorithmic service, not only a physical object."]],callout:"The key transition: medical devices moved from objects to systems, then from systems to platforms with service, software, data, evidence, and post-market learning.",ai:ai.companies,source:"Teaching synthesis using international MedTech examples: 3M, BD, Baxter, Siemens Healthineers, GE HealthCare, Philips, Medtronic, Abbott, Boston Scientific, Intuitive Surgical, HeartFlow."},
      {layout:"industryMap",eye:"Global ecosystem - industry",title:"The medical-device world is an ecosystem, not one market",accent:theme.B,lead:"A device idea enters a world shaped by multinational platforms, local suppliers, procurement rules, consumables, service, and user trust.",groups:[["Global medtech groups","Medtronic, Johnson & Johnson MedTech, Siemens Healthineers, GE HealthCare, Philips, Abbott, BD, 3M, Medline"],["Regional integrators","Taiwan examples include PAHSCO-style suppliers that combine consumables, equipment, service, hospital projects, and ISO / CE / GMP readiness."],["Clinical users + buyers","Hospitals, ministries, clinicians, pharmacists, lab teams, radiology, EMS, OT, procurement, and biomedical engineering departments."],["The hidden system","Spare parts, calibration, training, repair contracts, cold chain, consumables, cybersecurity, data flow, and post-market feedback."]],callout:"For LMIC and resource-constrained settings, the question is rarely 'Can the device work once?' It is 'Can this ecosystem keep it useful, safe, supplied, and repaired?'",photos:[img.ct,img.ox,img.genexpert],source:"Teaching synthesis from public company profiles, ISO/IEC/IMDRF roles, and medical-device market structure."},
      {layout:"regulatoryEcosystem",eye:"Global ecosystem - governance",title:"Who decides whether a device is safe enough?",accent:theme.C,center:["Manufacturer owns the claim","The manufacturer must define intended use, risk class, evidence, labeling, quality system, and post-market learning."],nodes:[["Regulators","FDA, EU competent authorities, TFDA, PMDA / MHLW, NMPA and other national authorities decide legal routes and market rules."],["Standards + harmonization","ISO 13485, ISO 14971, IEC 60601, IEC 62304, IEC 62366-1, IMDRF, and WHO GMRF create shared technical language."],["Notified bodies + test labs","In the EU, notified bodies such as TUV SUD, TUV Rheinland, BSI, DEKRA, and SGS perform conformity assessment for many device classes."],["Hospitals + HTA + users","Hospitals, professional societies, HTA bodies, and payers ask whether the device improves care, fits workflow, and is worth sustaining."]],callout:"A third party can audit, test, or review evidence, but it does not remove the manufacturer's responsibility for safety and truthfulness.",ai:ai.regulatory,source:"FDA; EU MDR/IVDR; TFDA; ISO; IEC; IMDRF; WHO GMRF; EU notified-body conformity-assessment model."},
      {layout:"thirdPartyChain",eye:"Global ecosystem - evidence chain",title:"Third parties turn device claims into usable evidence",accent:theme.A,steps:[["1. Standards","ISO / IEC / IMDRF language tells teams what evidence should look like."],["2. QMS audit","ISO 13485-style audits check whether design, suppliers, production, and complaints are controlled."],["3. Lab testing","Safety, EMC, performance, calibration, biocompatibility, and software testing make hazards visible."],["4. Clinical evidence","CROs, hospitals, ethics boards, and investigators help generate evidence in real users and settings."],["5. Value review","HTA, payers, professional societies, and hospital committees ask whether adoption is justified."],["6. Post-market","Complaints, vigilance, repairs, cybersecurity, and field data keep the device safe after launch."]],callout:"The practical lesson: do not wait until the end to ask for evidence. Build the evidence chain into the design from day one.",photos:[img.genexpert,img.ultrasound,img.pump],source:"ISO 13485; ISO 14971; IEC 60601; IEC 62304; EU MDR/IVDR; WHO GMRF; clinical-evidence and HTA practice."},
      {layout:"historyTimeline",eye:"Why regulation evolved",title:"Medical-device regulation grew from harm, complexity, and software",accent:theme.C,events:[["1976","Device law","US Medical Device Amendments created risk classes and premarket pathways after safety failures."],["1990s","Design controls","Quality systems and design controls made requirements, verification, and change control visible."],["2000s","Risk + software","ISO 14971 and IEC 62304 turned risk management and software lifecycle into expected evidence."],["2010s","Global convergence","IMDRF, EU MDR, and reliance models pushed shared language, technical files, and stronger post-market duties."],["2020s","AI + real systems","SaMD, AI, cybersecurity, real-world monitoring, and LMIC access make adoption and maintenance part of safety."]],callout:"History explains the five families: each new wave of harm or complexity created a new evidence question.",ai:ai.history,source:"US Medical Device Amendments; FDA design controls; ISO 14971; IEC 62304; IMDRF; EU MDR; WHO GMRF."},
      {layout:"system",eye:"Why we need more than one method",title:"A medical device is a system, not a product",accent:theme.brand,lead:"A device passes through five worlds before it helps a patient. Each world has its own language, experts, and failure mode.",callout:"A device that works in one setting can fail in another because power, staffing, repair, procurement, trust, and workflow are different. From this point on, every slide answers one of five survival questions: is the problem real, buildable, safe, affordable, and adoptable?",cards:[["Need","Find the right problem",theme.A],["Translate","Turn it into a real device",theme.B],["Regulate","Build it safely and legally",theme.C],["Value","Make it viable for a public or mixed health system",theme.D],["Adopt","Make sure it is used and sustained",theme.E]],ai:ai.system},
      {layout:"harmLadder",eye:"Not all devices are treated equally",title:"More possible harm means more evidence",accent:theme.C,lead:"Risk class is not a memorization exercise. It is a practical way to ask: how much harm could a wrong result, failure, or misuse cause?",steps:[["Low","Thermometer","Wrong reading usually means repeat measurement or brief inconvenience.","Basic controls",25,theme.A],["Moderate","Pulse oximeter","Wrong or missed reading can delay oxygen, referral, or monitoring.","Bench + usability evidence",55,theme.D],["High","Infusion / insulin pump","Wrong dose or device failure can cause serious injury or death.","Clinical evidence + QMS + PMS",88,theme.C]],callout:"Plain ladder: thermometer -> pulse oximeter -> infusion pump / insulin pump. Harm goes up, evidence burden goes up.",photos:[img.ox,img.pump],source:"IMDRF/GHTF risk-class principles; regulator classification schemes."},
      {layout:"classificationMap",eye:"Classification bridge",title:"Classification is a two-question map",accent:theme.C,xAxis:["Inform / monitor","Diagnose / drive care","Treat / support / modify"],yAxis:["High possible harm","Moderate possible harm","Low possible harm"],cells:[[["Implantable pacemaker","Closed-loop insulin","Infusion pump"],["TB CXR triage","EMS ECG referral","Maternity risk score"],["Thermometer","Wellness monitor","Basic display"]],[["Changes body function or therapy automatically","Highest evidence burden"],["Influences clinical action","Risk depends on decision and harm if wrong"],["Informs or records","Usually lower burden unless claim changes"]]],callout:"Ask two questions together: what clinical action does the device influence, and how badly could a wrong result or failure harm the patient?",source:"Teaching synthesis from IMDRF/GHTF classification logic and SaMD risk frameworks."},
      {layout:"regulatorMap",eye:"Regulatory thinking for non-specialists",title:"Regulation starts with four decisions",accent:theme.C,cards:[["1. Intended use","What medical claim are you making, for which patient, user, and setting?"],["2. Risk class","If it fails, could the patient be delayed, harmed, seriously injured, or die?"],["3. First route","Home-country approval, reliance on a trusted regulator, donor procurement requirement, or export market?"],["4. Evidence package","Bench test, usability test, software verification, clinical data, QMS, maintenance, post-market plan."]],callout:"Do not memorize routes. Know the questions to ask before building: claim, risk, route, evidence.",source:src.regs},
      {layout:"docStack",eye:"Why these worlds look similar",title:"Most countries ask for the same logic",accent:theme.B,cards:[["IMDRF","Shared vocabulary among regulators. You do not memorize it; you use it to communicate risk, evidence, and intended use."],["WHO GMRF","A practical model for countries building or strengthening medical-device regulation, especially where systems are still maturing."]],stack:["Local law, reliance, and procurement: your ministry decides what is legally accepted","Technical file logic: intended use, class, risk, verification, validation, labeling, PMS","Shared standards: ISO 13485, ISO 14971, IEC 62304, IEC 62366, IEC 60601"],callout:"Adapt, do not copy. A strong technical file helps smaller systems use reliance, donor review, or regional harmonization without starting from zero.",photos:[img.mri3t,img.pump,img.pacemaker],source:src.imdrf},
      {layout:"medDevice101",eye:"Checkpoint before the framework map",title:"Medical Device 101 - five concepts you must keep together",accent:theme.brand,steps:[["1","Intended use","What medical claim are we making?","Patient, user, setting, and clinical decision"],["2","Risk class","How bad is a wrong result or failure?","Harm severity, probability, and misuse"],["3","Evidence","What proof matches the risk?","Bench, usability, software, clinical, QMS"],["4","Lifecycle controls","How do we control change over time?","Requirements, V&V, risk file, traceability"],["5","Post-market duty","How do we keep it safe after launch?","Training, complaints, repair, updates, vigilance"]],callout:"If you remember only one regulatory idea: the claim creates the device; the possible harm sets the evidence burden; the lifecycle keeps the device truthful after launch.",source:"Teaching synthesis from IMDRF/GHTF definitions, ISO 13485, ISO 14971, IEC 62304, IEC 62366, and post-market surveillance practice."},
      {layout:"lifecycleMap",eye:"Lifecycle checkpoint",title:"A medical device lifecycle is a responsibility loop",accent:theme.B,stages:[["1","Need + claim","Define problem, patient, user, setting, and intended use.","Need statement; intended-use claim"],["2","Design inputs","Translate user needs into measurable requirements and risk controls.","Requirements; hazard analysis"],["3","Build + verify","Show the device was built right before it reaches real users.","Bench test; software test; traceability"],["4","Validate + approve","Show the right device works for the intended users and route.","Usability; clinical evidence; technical file"],["5","Launch + train","Make adoption safe: procurement, labeling, maintenance, training, ownership.","IFU; service plan; training records"],["6","Post-market learn","Listen after launch: complaints, repairs, adverse events, cybersecurity, updates.","PMS; CAPA; change control"]],callout:"Lifecycle thinking protects LMIC settings from donation failure: if no one owns training, consumables, repair, complaints, and software updates, the device is not truly finished.",source:"ISO 13485 design and production controls; ISO 14971 risk management; IEC 62304 software lifecycle; IEC 62366 usability engineering; post-market surveillance practice."},
      {layout:"landscape",eye:"The whole landscape on one page",title:"Five families of frameworks",accent:theme.A,rows:[["Need",theme.A,"What problem is worth solving?",["Observe","Ask users","Define the job"]],["Translate",theme.B,"Can this become a real device?",["Prototype","Evidence plan","Implementation path"]],["Regulate",theme.C,"Can it be built safely and legally?",["Risk","Testing","Technical file"]],["Value",theme.D,"Who pays, owns, and maintains it?",["Budget","Procurement","Service model"]],["Adopt",theme.E,"Will it still be used after the pilot?",["Workflow","Training","Repair"]]],callout:"This is a master map, not a vocabulary quiz. Use the five families as lenses: need, translate, regulate, value, adopt.",ai:ai.families},
      {layout:"decision",eye:"Preview the method",title:"Preview: use five families as a decision guide",accent:theme.brand,rows:[["1","Discover","Is there a real problem worth solving?","Need","Add Value and Adopt early: budget and workflow risk"],["2","Translate","Can this become a real device in this setting?","Translate","Add Regulate early: intended use, class, evidence"],["3","Engineer & verify","Can the device be built, tested, repaired, and documented?","Regulate","Need returns when usability or workflow breaks"],["4","Validate value","Who pays, owns, maintains, and benefits?","Value","Adopt tests procurement and workflow reality"],["5","Adopt & sustain","Will it still be used after the pilot ends?","Adopt","Use this flow to evaluate donations and procurement, not only inventions"]],callout:"First preview: these five questions are the method we will reuse in the activity. Do not memorize framework names; use the families to decide what to test next.",ai:ai.decision,source:"Course synthesis from Families A-E."},
      {layout:"familyAPhoto",eye:"Family A: Need",title:"Family A: Need - Design Thinking",accent:theme.A,cards:[["d.school","Empathize -> Define -> Ideate -> Prototype -> Test. Strong for UX, services, software, education tools."],["Double Diamond","Discover -> Define -> Develop -> Deliver. Useful in public health and service design."],["IDEO / WHO HCD","Hear -> Create -> Deliver. Designed for low-resource and cross-cultural settings."],["AHEAD","Human-centered design combined with health-services research."],["Jobs-to-be-Done","Ask what job the patient, clinician, or hospital is hiring the device to do."],["Light touch","We spend more time on device-specific families that many courses skip."]],source:src.design},
      {layout:"compare",eye:"A reality check",title:"Design thinking alone will not give you a device",accent:theme.A,leftTitle:"What it is great at",left:["Finding a need worth solving","Reframing problems from the user's view","Generating concepts quickly","Early sketches and paper prototypes"],rightTitle:"What it does not give you",right:["Clinical evidence plan","Regulatory classification","ISO 14971 risk file","IEC 62304 lifecycle","Reimbursement strategy","Hospital implementation plan"],callout:"Design thinking finishes around the concept. After that, medical-device-specific families take over."},
      {layout:"frameworkGrid",eye:"Family B: Translate",title:"Family B: Translate - Turning Ideas into Devices",accent:theme.B,cards:[["Need-driven pathway","Identify -> Invent -> Implement starts from a real clinical need, then builds the evidence and survival plan toward use.",["Immersion","Need statement","Evidence plan"],"ranked needs + stakeholder map","Can you name the owner, user, buyer, maintainer, and patient risk?"],["Fast concept sprint","A short sprint is useful when clinicians, engineers, managers, and students need shared understanding quickly.",["1-day workshop","Sketches","Assumption list"],"concept options + riskiest assumptions","Did the sprint produce testable questions, not just attractive ideas?"],["Inclusive design lens","Make accessibility, language, maintenance, disability, caregiver burden, and human factors visible before the prototype hardens.",["Language","Literacy","Caregiver load"],"use-error scenarios + design requirements","Who is excluded if instructions, UI, or maintenance are difficult?"],["Stage-gate discipline","Use checkpoints before spending more money: need, prototype, test, validate, launch, and sustain.",["Gate review","V&V","Launch criteria"],"go / no-go decision record","What evidence must be true before the next budget is released?"]],callout:"Where they agree: spend time in the clinic before you draw on a whiteboard. Regulation is not a final exam.",source:"Biodesign, HCD, hackathon, and stage-gate methods; adapted for teaching."},
      {layout:"phasesVisual",eye:"Reference process",title:"Translate - Identify, Invent, Implement",accent:theme.B,phases:[["Identify","Clinical immersion; need statement; users; setting constraints; existing solutions; value question."],["Invent","Concept generation; simplest safe prototype; feasibility; risk class; evidence and maintenance plan."],["Implement","Clinical evaluation; submission or reliance route; procurement story; training; post-market learning."]],callout:"Use this as a practical staged process: find the need, invent only what the system can support, then plan how it will survive.",ai:ai.translate,source:"Medical-device translation methods synthesized for this lecture."},
      {layout:"frameworkGrid",eye:"Inside Family B: Translate",title:"Which translation pathway, when?",accent:theme.B,cards:[["From zero","Use a full need-to-implementation pathway when the problem, owner, buyer, evidence, and maintenance model are still unclear.",["Unknown need","Unknown owner","Unknown evidence"],"need ranking + implementation hypothesis","Do not prototype until the need is observed in the real workflow."],["Fast idea generation","Use a sprint when the goal is shared understanding, not regulatory-grade development or clinical validation.",["Workshop","Co-design","Assumptions"],"top 3 concepts + test plan","End with what to test next, not with a winner by enthusiasm."],["Accessibility first","Use inclusive design when language, disability, literacy, culture, shared devices, or caregiver burden may block use.",["Low literacy","Multilingual","Shared devices"],"accessibility requirements","Ask who cannot use it safely on the worst working day."],["Scale and launch","Use stage-gate discipline once manufacturing, verification, procurement, training, and service contracts become real.",["Procurement","Manufacturing","Training"],"launch readiness checklist","If training stops or spare parts delay, does the device still work?"]],callout:"Translation means inventing the device and its survival plan together.",source:"Biodesign, HCD, hackathon, and stage-gate methods; adapted for teaching."},
      {layout:"regulatoryDesk",eye:"Family C: Regulate",title:"Family C: Regulate - Safety Evidence",accent:theme.C,cards:[["Quality system","Show that requirements, suppliers, manufacturing, training, and complaints are controlled."],["Risk management","Show where the device could hurt someone and how that risk is reduced and monitored."],["Software lifecycle","Show that software requirements, code changes, tests, and known problems are controlled."],["Usability","Show that real users can use the device safely in real conditions."],["Post-market learning","Show how failures, complaints, repairs, updates, and field performance will be captured after launch."],["Takeaway","Do not memorize standard numbers. Know what evidence trail each one protects."]],photos:[img.pump,img.robot,img.genexpert],source:src.standards},

      {layout:"frameworkGrid",eye:"Family D: Value",title:"Family D: Value - Payment, Ownership, Maintenance",accent:theme.D,cards:[["Value story","Show what changes enough to justify adoption: patient outcome, staff time, referral delay, stock-out days, or system cost.",["Outcome","Time saved","Avoided delay"],"one measurable value claim","Would a hospital manager defend this purchase during budget cuts?"],["Ownership","Name who owns the device after the pilot: ministry, hospital, technician unit, donor, university, or private partner.",["Primary owner","Backup owner","Decision rights"],"RACI-style owner table","Who signs repair, calibration, training, and replacement decisions?"],["Procurement + donor exit","Test whether the system can buy consumables, service, calibration, and replacement after external funding ends.",["Consumables","Service contract","Tender cycle"],"3-year total cost view","What fails first after the donor, champion, or project budget leaves?"],["Jobs-to-be-Done","Ask who hires the device, who fires it, what workaround they use today, and what job the device must do better.",["Current workaround","Switch trigger","Fire trigger"],"replacement logic + adoption risk","What existing habit or workaround is stronger than your device?"]],callout:"In public health systems, business often means value, ownership, procurement, and who keeps the device alive after funding ends.",source:src.business},

      {layout:"frameworkGrid",eye:"How to read NASSS",title:"How to read the heatmap in 60 seconds",accent:theme.E,cards:[["Green","Routine enough for the current facility or program, but still verify with users under real workload.",["Routine","Known owner","Low change"],"keep and monitor","What evidence shows this is truly routine?"],["Yellow","Workable, but requires training, workflow change, manager support, or a small procurement adjustment.",["Training","Workflow","Manager support"],"mitigation action","Who must change behavior for this to become green?"],["Red","System redesign is needed: procurement, maintenance, connectivity, ownership, staffing, or policy.",["Procurement","Repair","Policy"],"design requirement","What would break first if we launch unchanged?"],["Use in the activity","Each team names one red cell and turns it into a concrete design or implementation requirement.",["Pick one red","Rewrite it","Assign owner"],"red-cell action statement","Can the group write it as a requirement, not a complaint?"],["Do not blame users","A red cell means the device and system do not yet fit. It is a design signal, not a judgment of a country.",["Respect","System fit","No blame"],"respectful wording","Say facility / setting / health system, not better or worse country."],["One-line test","If the donor leaves, the champion changes job, or the spare part breaks, does the device still work?",["Donor leaves","Champion leaves","Part breaks"],"90-day survival question","Would the device survive ordinary turnover?"]],callout:"NASSS is not a grading tool for countries. It is a way to protect patients, staff time, and scarce budgets.",source:"Greenhalgh et al., JMIR 2017, NASSS framework; adapted for workshop use."},

          });

        });
      });
